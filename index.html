<title>LSC 1103 – Social Media Communication Lab</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#ede9fe,#fdf2f8,#f0fdfa);min-height:100vh;padding-bottom:2.5rem;}
button{cursor:pointer;font-family:inherit;transition:opacity 0.15s;}
button:hover{opacity:0.88;}
textarea{font-family:inherit;outline:none;}
input[type=checkbox]{cursor:pointer;}

/* layout */
.header{background:linear-gradient(to right,#7c3aed,#db2777);color:white;padding:2rem 1.25rem 4rem;text-align:center;}
.header p{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:#e9d5ff;margin-bottom:.25rem;}
.header h1{font-size:1.5rem;font-weight:900;margin-bottom:.25rem;}
.header small{font-size:.85rem;color:#f3e8ff;}
.card{background:white;border-radius:1.5rem;box-shadow:0 8px 32px rgba(0,0,0,.12);overflow:hidden;max-width:38rem;margin:-2rem auto 0;padding:0 1rem;}
.tabs{display:flex;border-bottom:2px solid #f3f4f6;}
.tab-btn{flex:1;padding:.75rem;font-weight:700;font-size:.875rem;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;background:transparent;color:#9ca3af;}
.tab-btn.active{color:#6d28d9;border-bottom-color:#7c3aed;}
.tab-content{padding:1.25rem;display:none;}
.tab-content.active{display:block;}

/* accordion */
.acc-group{border-radius:1rem;border:2px solid #ddd6fe;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:1.25rem;}
.acc-header{color:white;padding:.75rem 1.25rem;font-weight:700;font-size:1rem;}
.acc-item{border-top:1px solid #ddd6fe;}
.acc-item:first-of-type{border-top:none;}
.acc-trigger{width:100%;display:flex;align-items:center;justify-content:space-between;padding:.7rem 1.25rem;background:transparent;border:none;text-align:left;font-size:.875rem;font-weight:600;}
.acc-chevron{transition:transform .2s;font-size:1.2rem;color:#9ca3af;}
.acc-body{display:none;padding:0 1.25rem .9rem;flex-direction:column;gap:.5rem;}
.acc-body.open{display:flex;}
.acc-def{color:#374151;font-size:.875rem;}
.acc-ex{font-size:.75rem;font-style:italic;padding:.5rem .75rem;border-radius:.5rem;}

/* table */
.ref-table{width:100%;border-collapse:collapse;font-size:.875rem;}
.ref-table th{padding:.5rem .75rem;text-align:left;font-weight:700;}
.ref-table td{padding:.5rem .75rem;}
.ref-table tr{border-top:1px solid #e0e7ff;}

/* quiz */
.progress-bar-bg{background:#e5e7eb;border-radius:999px;height:.5rem;margin-bottom:1rem;}
.progress-bar{height:.5rem;border-radius:999px;transition:width .3s;}
.q-box{border-radius:1rem;padding:1.1rem 1.25rem;margin-bottom:1rem;}
.opt-btn{width:100%;text-align:left;padding:.75rem 1.1rem;border-radius:.75rem;border:2px solid #e5e7eb;background:white;color:#374151;display:flex;align-items:center;gap:.75rem;font-weight:500;font-size:.875rem;margin-bottom:.6rem;}
.opt-btn.correct{border-color:#4ade80;background:#f0fdf4;color:#166534;}
.opt-btn.wrong{border-color:#f87171;background:#fef2f2;color:#991b1b;}
.opt-btn.faded{border-color:#e5e7eb;background:#f9fafb;color:#9ca3af;}
.opt-letter{width:1.75rem;height:1.75rem;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;}
.fb-box{padding:.75rem 1rem;border-radius:.75rem;font-weight:500;font-size:.875rem;margin-bottom:1rem;}
.fb-ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;}
.fb-bad{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;}
.next-btn{width:100%;padding:.75rem;border-radius:.75rem;font-weight:700;color:white;border:none;font-size:1rem;}
.badge{font-size:.7rem;font-weight:700;padding:.1rem .5rem;border-radius:999px;display:inline-block;}
.cat-badge{font-size:.75rem;font-weight:700;padding:.2rem .75rem;border-radius:999px;}
.score-circle{width:5rem;height:5rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:900;color:white;flex-shrink:0;}
.hist-dots{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;max-width:18rem;margin:.5rem auto;}
.hist-dot{width:2.2rem;height:2.2rem;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:.75rem;}

/* create */
.scenario-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem;}
.sc-btn{padding:.75rem;border-radius:.75rem;border:2px solid #e5e7eb;background:white;text-align:left;font-size:.875rem;}
.sc-btn.selected{box-shadow:0 0 0 3px rgba(124,58,237,.3);}
.sc-emoji{font-size:1.5rem;margin-bottom:.25rem;}
.sc-name{font-weight:700;font-size:.875rem;}
.brief-box{border-radius:1rem;padding:1rem;margin-bottom:1rem;}
.brief-row{display:flex;gap:.5rem;margin-bottom:.25rem;font-size:.875rem;}
.brief-label{color:#6b7280;min-width:5.5rem;flex-shrink:0;}
.brief-val{font-weight:600;color:#1f2937;}
.tip-text{margin-top:.5rem;font-size:.75rem;color:#6b7280;font-style:italic;}
.wc-badge{font-size:.75rem;font-weight:700;padding:.2rem .6rem;border-radius:999px;}
.wc-ok{background:#ccfbf1;color:#0f766e;}
.wc-bad{background:#fee2e2;color:#dc2626;}
.wc-neutral{background:#f3f4f6;color:#6b7280;}
textarea.post-area{width:100%;border:2px solid #e5e7eb;border-radius:.75rem;padding:.9rem;font-size:.875rem;line-height:1.6;resize:none;color:#1f2937;display:block;}
.check-list{background:#f8fafc;border:2px solid #e2e8f0;border-radius:1rem;padding:1rem;margin-bottom:1rem;}
.check-item{display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem;font-size:.875rem;color:#374151;}
.action-row{display:flex;gap:.75rem;margin-bottom:.75rem;}
.action-btn{flex:1;padding:.75rem;border-radius:.75rem;font-weight:700;font-size:.875rem;border:none;}
.model-box{background:#fefce8;border:2px solid #fde047;border-radius:.75rem;padding:1rem;font-size:.9rem;line-height:1.7;color:#374151;margin-bottom:.75rem;display:none;}
.breakdown-box{border-radius:.75rem;padding:1rem;margin-bottom:.75rem;display:none;}
.breakdown-item{padding:.5rem .75rem;border-radius:.4rem;margin-bottom:.4rem;font-size:.8rem;}
.print-btn{width:100%;padding:.75rem;border-radius:.75rem;font-weight:700;color:#374151;background:#f8fafc;border:2px solid #e2e8f0;font-size:.875rem;display:none;}
.hidden{display:none;}

/* result screen */
.result-screen{text-align:center;padding:2rem 0;}
.result-pct{font-size:3.5rem;font-weight:900;margin-bottom:.5rem;}
.result-title{font-size:1.4rem;font-weight:700;color:#1f2937;margin-bottom:.25rem;}
.result-sub{color:#6b7280;margin-bottom:1rem;}
.restart-btn{background:#7c3aed;color:white;font-weight:700;padding:.75rem 2rem;border-radius:.75rem;border:none;font-size:1rem;}

/* colours */
.purple-bg{background:#7c3aed;} .purple-lt{background:#f5f3ff;} .purple-br{border-color:#ddd6fe;} .purple-tx{color:#6d28d9;} .purple-bx{background:#ede9fe;color:#6d28d9;}
.indigo-bg{background:#4338ca;} .indigo-lt{background:#eef2ff;} .indigo-br{border-color:#c7d2fe;} .indigo-tx{color:#4338ca;} .indigo-bx{background:#e0e7ff;color:#4338ca;}
.cyan-bg{background:#0891b2;}   .cyan-lt{background:#ecfeff;}   .cyan-br{border-color:#a5f3fc;}   .cyan-tx{color:#0e7490;}   .cyan-bx{background:#cffafe;color:#0e7490;}
.teal-bg{background:#0d9488;}   .teal-lt{background:#f0fdfa;}   .teal-br{border-color:#99f6e4;}   .teal-tx{color:#0f766e;}   .teal-bx{background:#ccfbf1;color:#0f766e;}
.orange-bg{background:#ea580c;} .orange-lt{background:#fff7ed;} .orange-br{border-color:#fed7aa;} .orange-tx{color:#c2410c;} .orange-bx{background:#ffedd5;color:#c2410c;}
.pink-bg{background:#db2777;}   .pink-lt{background:#fdf2f8;}   .pink-br{border-color:#fbcfe8;}   .pink-tx{color:#be185d;}   .pink-bx{background:#fce7f3;color:#be185d;}
.blue-bg{background:#2563eb;}   .blue-lt{background:#eff6ff;}   .blue-br{border-color:#bfdbfe;}   .blue-tx{color:#1d4ed8;}   .blue-bx{background:#dbeafe;color:#1d4ed8;}
</style>
</head>

const concepts = [
  { group:"📣 Purposes of Social Media Posts", color:"purple", items:[
    {term:"To Inform",icon:"ℹ️",def:"Share facts or knowledge clearly. Answers What? When? Where? Why?",ex:'"Our new opening hours are from 9 AM to 5 PM starting tomorrow."'},
    {term:"To Advertise",icon:"🛒",def:"Promote a product or service. Highlights features, discounts, or benefits.",ex:'"Buy one, get one free! Limited offer on our skincare range."'},

  ]},
  { group:"📋 7 Types of Announcements", color:"indigo", items:[
    {term:"Product Launch",abbr:"PL",icon:"🚀",def:"Announces a new product or service available for the first time.",ex:'"Totally new, totally you. The iPhone 20 — available now at Apple Stores worldwide."'},
    {term:"Company News",abbr:"CN",icon:"🏢",def:"Shares internal updates, policy changes, or general business news.",ex:'"Office hours are changing during Ramadan. Please check our updated schedule."'},

  { group:"🪝 Hooks — Engaging Opening Lines", color:"cyan", items:[
    {term:"What is a Hook?",icon:"🎣",def:"A hook is the first sentence of a post designed to grab the reader's attention immediately.",ex:'"Totally new, totally you." — far more engaging than "We have a new product."'},
    {term:"Hook for Product Launch",icon:"🚀",def:"Tease the product's novelty. Use short, punchy sentences.",ex:'"Totally new, totally you. The iPhone 20."'},

  ]},
  { group:"🔍 Key Elements of a Post", color:"orange", items:[

    {term:"Audience",icon:"👥",def:"The specific group the post is directed towards.",ex:'"Attention all fitness enthusiasts!" → Audience = fitness lovers.'},
    {term:"Message",icon:"💬",def:"The main information or ideas being shared.",ex:'"Our new app is available for download" → the core message.'},
    {term:"Purpose",icon:"🎯",def:"The goal or reason behind the post.",ex:'"Sign up now" → Purpose = Call for Action.'},

function toggleAcc(id, color) {
  const body = document.getElementById(id);
  const chev = document.getElementById(id + '-chev');

/* ═══════════════════════════════════════════════════════════════════
   PRACTICE
═══════════════════════════════════════════════════════════════════ */
let pool = [], qIdx = 0, selected = null, history = [];

function buildPractice() {
  pool = [...questions].sort(() => Math.random() - 0.5).slice(0, 18);
  qIdx = 0; selected = null; history = [];
  renderQuestion();
}

function renderQuestion() {
  const area = document.getElementById('quiz-area');
  if (qIdx >= pool.length) { renderResult(); return; }
  const q = pool[qIdx];
  const c = catColor[q.cat] || 'purple';
  const pct = (qIdx / pool.length) * 100;
  const letters = ['A','B','C','D'];

  area.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;">
      <span class="cat-badge ${c}-bx">${q.cat}</span>
      <span style="font-size:.875rem;color:#6b7280;">${qIdx+1} / ${pool.length}</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar ${c}-bg" style="width:${pct}%"></div>
    </div>
    <div class="q-box ${c}-lt ${c}-br" style="border:2px solid;">
      <p style="font-weight:500;color:#1f2937;line-height:1.6;">${q.q}</p>
    </div>
    <div id="options">
      ${q.opts.map((opt,i) => `
        <button class="opt-btn" id="opt-${i}" onclick="chooseAnswer(${i})">
          <span class="opt-letter" id="ltr-${i}">${letters[i]}</span>
          ${opt}
        </button>`).join('')}
    </div>
    <div id="feedback" style="display:none;" class="fb-box"></div>
    <button id="next-btn" class="next-btn ${c}-bg" onclick="nextQuestion()" style="display:none;">
      ${qIdx+1 >= pool.length ? 'See Results →' : 'Next Question →'}
    </button>`;
}

function chooseAnswer(i) {
  if (selected !== null) return;
  selected = i;
  const q = pool[qIdx];
  const letters = ['A','B','C','D'];
  q.opts.forEach((_, idx) => {
    const btn = document.getElementById('opt-'+idx);
    const ltr = document.getElementById('ltr-'+idx);
    if (idx === q.ans) { btn.className='opt-btn correct'; ltr.textContent='✓'; }
    else if (idx === i && i !== q.ans) { btn.className='opt-btn wrong'; ltr.textContent='✗'; }
    else { btn.className='opt-btn faded'; ltr.textContent=letters[idx]; }
  });
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  if (i === q.ans) { fb.className='fb-box fb-ok'; fb.textContent='✅ Correct! Well done.'; }
  else { fb.className='fb-box fb-bad'; fb.textContent=`❌ Not quite. The correct answer is: "${q.opts[q.ans]}"`; }
  document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
  history.push({ ok: selected === pool[qIdx].ans });
  qIdx++; selected = null;
  renderQuestion();
}

function renderResult() {
  const total = history.filter(h => h.ok).length;
  const pct = Math.round((total / pool.length) * 100);
  const pass = pct >= 80;
  document.getElementById('quiz-area').innerHTML = `
    <div class="result-screen">
      <div class="result-pct" style="color:${pass?'#14b8a6':'#f97316'}">${pct}%</div>
      <div class="result-title">${pass ? '🎉 Excellent work!' : '💪 Keep practising!'}</div>
      <div class="result-sub">You got ${total} out of ${pool.length} correct.</div>
      <div class="hist-dots">
        ${history.map((h,i)=>`<div class="hist-dot" style="background:${h.ok?'#4ade80':'#f87171'}">${i+1}</div>`).join('')}
      </div>
      <button class="restart-btn" onclick="buildPractice()" style="margin-top:1rem;">🔄 Try Again</button>
    </div>`;
}

let activeSc = null;

function buildCreate() {
  const grid = document.getElementById('scenario-grid');

      <div class="sc-emoji">${s.emoji}</div>
      <div class="sc-name ${s.color}-tx">${s.title}</div>
      <span class="badge ${s.color}-bx" style="margin-top:.25rem;">${abbr}</span>
    </button>`;
  }).join('');
}

    b.style.background = 'white';
  });
  const btn = document.getElementById('sc-btn-' + id);

  // get the light bg colour from CSS variables via computed style workaround
  const lightMap = {purple:'#f5f3ff',indigo:'#eef2ff',cyan:'#ecfeff',teal:'#f0fdfa',orange:'#fff7ed',pink:'#fdf2f8',blue:'#eff6ff'};
  const borderMap = {purple:'#7c3aed',indigo:'#4338ca',cyan:'#0891b2',teal:'#0d9488',orange:'#ea580c',pink:'#db2777',blue:'#2563eb'};
  btn.style.background = lightMap[c];
  btn.style.borderColor = borderMap[c];

  const abbr = (activeSc.type.match(/\(([^)]+)\)/) || [])[1] || '';
  const briefRows = [
    ["📋 Type", activeSc.type], ["🎭 Appeal", activeSc.appeal],
    ["✍️ Writer", activeSc.writer], ["👥 Audience", activeSc.audience],
    ["🎯 Purpose", activeSc.purpose], ["🌍 Context", activeSc.context]
  ];

  const detail = document.getElementById('scenario-detail');
  detail.className = '';
  detail.innerHTML = `
    <div class="brief-box ${c}-lt ${c}-br" style="border:2px solid;margin-bottom:1rem;">
      <div style="font-weight:700;font-size:.875rem;margin-bottom:.5rem;" class="${c}-tx">📋 Your Scenario Brief</div>
      ${briefRows.map(([l,v])=>`<div class="brief-row"><span class="brief-label">${l}:</span><span class="brief-val">${v}</span></div>`).join('')}
      <div class="tip-text">💡 ${activeSc.tip}</div>
    </div>

    <div style="margin-bottom:1rem;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;">
        <label style="font-size:.875rem;font-weight:600;color:#374151;">✍️ Write your post (target: 50–60 words)</label>
        <span class="wc-badge wc-neutral" id="wc-badge">0 words</span>
      </div>
      <textarea class="post-area" id="post-area" rows="5"
        placeholder="Start with a strong hook! Then include your message, details, and a call to action..."
        oninput="updateWC()"></textarea>
    </div>

    <div class="check-list">
      <div style="font-weight:700;color:#334155;font-size:.875rem;margin-bottom:.6rem;">☑️ Self-Check (<span id="check-count">0</span>/${checklist.length})</div>
      ${checklist.map(c=>`
        <label class="check-item">
          <input type="checkbox" id="chk-${c.id}" onchange="updateCheckCount()">
          <span>${c.label}</span>
        </label>`).join('')}
      <div id="check-done" style="display:none;margin-top:.6rem;padding:.6rem .75rem;border-radius:.6rem;background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;font-size:.8rem;font-weight:600;">
        ✅ Great job checking your work! Now compare with the model answer below.
      </div>
    </div>

    <div class="action-row">
      <button class="action-btn ${c}-bg" style="color:white;" onclick="toggleModel()">👁️ Show Model Answer</button>
      <button class="action-btn ${c}-lt ${c}-br ${c}-tx" style="border:2px solid;" onclick="toggleBreakdown()">🔍 See Breakdown</button>
    </div>

    <div class="model-box" id="model-box">
      <div style="font-weight:700;color:#854d0e;font-size:.75rem;margin-bottom:.4rem;">📝 MODEL ANSWER</div>
      ${activeSc.model}
    </div>

    <div class="breakdown-box ${c}-lt ${c}-br" id="breakdown-box" style="border:2px solid;">
      <div style="font-weight:700;font-size:.875rem;margin-bottom:.6rem;" class="${c}-tx">🔍 Why this model answer works</div>
      ${activeSc.breakdown.map(b=>`
        <div class="breakdown-item" style="border:1px solid #e0e7ff;background:white;">
          <span style="font-weight:700;" class="${c}-tx">${b.label}: </span>
          <span style="color:#4b5563;">${b.note}</span>
        </div>`).join('')}
    </div>

    <button class="print-btn" id="print-btn" onclick="doPrint()">🖨️ Print My Answer & Model</button>`;
}

let modelVisible = false, breakdownVisible = false;
function toggleModel() {
  modelVisible = !modelVisible;
  const box = document.getElementById('model-box');
  box.style.display = modelVisible ? 'block' : 'none';
  const btn = box.previousElementSibling.querySelector('button:first-child');
  if (btn) btn.textContent = modelVisible ? '🙈 Hide Model Answer' : '👁️ Show Model Answer';
}
function toggleBreakdown() {
  breakdownVisible = !breakdownVisible;
  const box = document.getElementById('breakdown-box');
  box.style.display = breakdownVisible ? 'block' : 'none';
  const btn = box.previousElementSibling.querySelector('button:last-child');
  if (btn) btn.textContent = breakdownVisible ? 'Hide Breakdown' : '🔍 See Breakdown';
}

function updateWC() {
  const text = document.getElementById('post-area').value.trim();
  const wc = text ? text.split(/\s+/).length : 0;
  const badge = document.getElementById('wc-badge');
  badge.textContent = wc + ' words';
  badge.className = 'wc-badge ' + (wc>=50&&wc<=60 ? 'wc-ok' : wc>60 ? 'wc-bad' : 'wc-neutral');
  document.getElementById('print-btn').style.display = text.length > 0 ? 'block' : 'none';
}

function updateCheckCount() {
  const count = checklist.filter(c => document.getElementById('chk-'+c.id)?.checked).length;
  document.getElementById('check-count').textContent = count;
  document.getElementById('check-done').style.display = count === checklist.length ? 'block' : 'none';
}
