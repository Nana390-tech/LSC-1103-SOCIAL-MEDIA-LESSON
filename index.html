<html lang="en">
<head>

<title>LSC 1103 – Social Media Communication Lab</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#ede9fe 0%,#fdf2f8 50%,#f0fdfa 100%);min-height:100vh;padding-bottom:2.5rem;}
button{cursor:pointer;font-family:inherit;transition:all 0.18s;}
textarea{font-family:inherit;outline:none;}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,#6d28d9,#9333ea,#db2777);color:white;padding:2rem 1.25rem 4.5rem;text-align:center;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}
.header-float{position:absolute;opacity:.12;font-size:2.5rem;animation:float 6s ease-in-out infinite;}
.header-float:nth-child(2){top:10%;left:5%;animation-delay:0s;}
.header-float:nth-child(3){top:20%;right:8%;animation-delay:2s;}
.header-float:nth-child(4){bottom:25%;left:12%;animation-delay:4s;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.header-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.15em;color:#e9d5ff;margin-bottom:.3rem;position:relative;}
.header h1{font-size:1.6rem;font-weight:900;margin-bottom:.3rem;position:relative;text-shadow:0 2px 8px rgba(0,0,0,.2);}
.header small{font-size:.82rem;color:#f3e8ff;position:relative;}
.header-wave{position:absolute;bottom:0;left:0;right:0;height:2rem;background:transparent;}

/* ── CARD ── */
.card{background:white;border-radius:1.5rem;box-shadow:0 8px 40px rgba(109,40,217,.15);overflow:hidden;max-width:38rem;margin:-2.5rem auto 0;position:relative;}
.card::before{content:'';display:block;height:4px;background:linear-gradient(to right,#7c3aed,#a855f7,#ec4899,#f97316);}

/* ── STUDENT BAR ── */
.student-bar{display:flex;gap:.5rem;padding:.7rem 1rem .5rem;background:linear-gradient(to right,#f5f3ff,#fdf2f8);border-bottom:1px solid #ede9fe;}
.s-input{flex:1;border:1.5px solid #ddd6fe;border-radius:.6rem;padding:.45rem .75rem;font-size:.78rem;color:#374151;outline:none;transition:border-color .2s;background:white;}
.s-input:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.1);}
.s-input::placeholder{color:#c4b5fd;}

/* ── TABS ── */
.tabs{display:flex;border-bottom:2px solid #f3f4f6;margin:0;padding:0 .25rem;}
.tab-btn{flex:1;padding:.65rem .25rem;font-weight:700;font-size:.76rem;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;background:transparent;color:#9ca3af;border-radius:.5rem .5rem 0 0;transition:all .2s;}
.tab-btn:hover{background:#f5f3ff;color:#7c3aed;}
.tab-btn.active{color:#6d28d9;border-bottom-color:#7c3aed;background:#faf5ff;}
.tab-content{display:none;padding:.25rem 1rem .5rem;}
.tab-content.active{display:block;}

/* ── ACCORDION ── */
.acc-group{border-radius:1rem;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:1.25rem;border:2px solid #ddd6fe;}
.acc-head{color:white;padding:.75rem 1.25rem;font-weight:700;font-size:1rem;}
.acc-trigger{width:100%;display:flex;align-items:center;justify-content:space-between;padding:.7rem 1.25rem;background:transparent;border:none;text-align:left;font-size:.875rem;font-weight:600;transition:background .15s;}
.acc-trigger:hover{background:rgba(0,0,0,.03);}
.acc-chev{transition:transform .25s;font-size:1.2rem;color:#9ca3af;display:inline-block;}
.acc-body{display:none;padding:0 1.25rem .9rem;animation:slideDown .2s ease;}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.acc-body.open{display:block;}
.acc-def{color:#374151;font-size:.875rem;margin-bottom:.4rem;}
.acc-ex{font-size:.75rem;font-style:italic;padding:.5rem .75rem;border-radius:.5rem;}
.badge{font-size:.7rem;font-weight:700;padding:.1rem .5rem;border-radius:999px;display:inline-block;}
.ref-table{width:100%;border-collapse:collapse;font-size:.875rem;}
.ref-table th{padding:.5rem .75rem;text-align:left;font-weight:700;}
.ref-table td{padding:.5rem .75rem;}

/* ── QUIZ ── */
.progress-bar-bg{background:#e5e7eb;border-radius:999px;height:.45rem;margin-bottom:1rem;}
.progress-bar{height:.45rem;border-radius:999px;transition:width .4s ease;}
.q-box{border-radius:1rem;padding:1.1rem 1.25rem;margin-bottom:1rem;border:2px solid;}
.opt-btn{width:100%;text-align:left;padding:.75rem 1.1rem;border-radius:.75rem;border:2px solid #e5e7eb;background:white;color:#374151;display:flex;align-items:center;gap:.75rem;font-weight:500;font-size:.875rem;margin-bottom:.6rem;transition:all .15s;}
.opt-btn:hover:not(:disabled){border-color:#a78bfa;background:#faf5ff;}
.opt-btn.correct{border-color:#4ade80;background:#f0fdf4;color:#166534;}
.opt-btn.wrong{border-color:#f87171;background:#fef2f2;color:#991b1b;}
.opt-btn.faded{border-color:#e5e7eb;background:#f9fafb;color:#9ca3af;}
.opt-letter{width:1.75rem;height:1.75rem;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;}
.fb-box{padding:.75rem 1rem;border-radius:.75rem;font-weight:500;font-size:.875rem;margin-bottom:1rem;}
.fb-ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;}
.fb-bad{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;}
.next-btn{width:100%;padding:.75rem;border-radius:.75rem;font-weight:700;color:white;border:none;font-size:1rem;transition:opacity .15s;}
.next-btn:hover{opacity:.88;}
.cat-badge{font-size:.75rem;font-weight:700;padding:.2rem .75rem;border-radius:999px;}
.hist-dot{width:2rem;height:2rem;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:.7rem;margin:.2rem;}

/* ── CREATE ── */
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem;}
.sc-btn{padding:.75rem;border-radius:.75rem;border:2px solid #e5e7eb;background:white;text-align:left;font-size:.875rem;transition:all .2s;}
.sc-btn:hover{border-color:#a78bfa;box-shadow:0 2px 8px rgba(124,58,237,.12);}
.brief-row{display:flex;gap:.5rem;margin-bottom:.25rem;font-size:.875rem;}
.brief-label{color:#6b7280;min-width:5.5rem;flex-shrink:0;}
.brief-val{font-weight:600;color:#1f2937;}
.wc-badge{font-size:.75rem;font-weight:700;padding:.2rem .6rem;border-radius:999px;}
.wc-ok{background:#ccfbf1;color:#0f766e;}
.wc-bad{background:#fee2e2;color:#dc2626;}
.wc-neutral{background:#f3f4f6;color:#6b7280;}
.post-area{width:100%;border:2px solid #e5e7eb;border-radius:.75rem;padding:.9rem;font-size:.875rem;line-height:1.6;resize:none;color:#1f2937;display:block;transition:border-color .2s;}
.post-area:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.1);}
.check-list{background:#f8fafc;border:2px solid #e2e8f0;border-radius:1rem;padding:1rem;margin-bottom:1rem;}
.check-item{display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem;font-size:.875rem;color:#374151;cursor:pointer;}
.action-row{display:flex;gap:.75rem;margin-bottom:.75rem;}
.action-btn{flex:1;padding:.75rem;border-radius:.75rem;font-weight:700;font-size:.875rem;border:none;transition:opacity .15s;}
.action-btn:hover{opacity:.88;}
.model-box{background:#fefce8;border:2px solid #fde047;border-radius:.75rem;padding:1rem;font-size:.9rem;line-height:1.7;color:#374151;margin-bottom:.75rem;display:none;}
.breakdown-box{border-radius:.75rem;padding:1rem;margin-bottom:.75rem;display:none;border:2px solid;}
.breakdown-item{padding:.5rem .75rem;border-radius:.4rem;margin-bottom:.4rem;font-size:.8rem;border:1px solid #e0e7ff;background:white;}
.print-btn{width:100%;padding:.75rem;border-radius:.75rem;font-weight:700;color:#374151;background:#f8fafc;border:2px solid #e2e8f0;font-size:.875rem;margin-bottom:.75rem;transition:all .15s;}
.print-btn:hover{background:#f0f0ff;border-color:#a78bfa;}

/* ── GLOSSARY ── */
.g-search{width:100%;border:2px solid #ddd6fe;border-radius:.75rem;padding:.65rem 1rem;font-size:.875rem;outline:none;transition:all .2s;background:#faf5ff;}
.g-search:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.1);}
.cat-pills{display:flex;flex-wrap:wrap;gap:.35rem;margin:.75rem 0;}
.cat-pill{padding:.3rem .75rem;border-radius:999px;border:1.5px solid #ddd6fe;background:white;font-size:.72rem;font-weight:700;color:#7c3aed;cursor:pointer;transition:all .18s;}
.cat-pill:hover,.cat-pill.active{background:#7c3aed;color:white;border-color:#7c3aed;}
.g-card{border-radius:1rem;overflow:hidden;margin-bottom:.65rem;border:2px solid;transition:box-shadow .2s;}
.g-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);}
.g-card-inner{display:flex;}
.g-en{padding:.75rem 1rem;flex:1;border-right:2px solid rgba(0,0,0,.06);}
.g-ar{padding:.75rem 1rem;flex:1;text-align:right;direction:rtl;}
.g-cat{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.2rem;}
.g-term{font-weight:800;font-size:.95rem;color:#1f2937;margin-bottom:.15rem;}
.g-def{font-size:.72rem;color:#6b7280;line-height:1.4;}
.g-empty{text-align:center;color:#9ca3af;padding:2.5rem 1rem;font-size:.875rem;}

/* ── RESULT ── */
.result-wrap{text-align:center;padding:1.5rem 0;}
.result-pct{font-size:4rem;font-weight:900;background:linear-gradient(135deg,#7c3aed,#db2777);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.result-label{font-size:1.3rem;font-weight:700;color:#1f2937;margin:.5rem 0 .25rem;}
.cert-btn{width:100%;padding:.9rem;border-radius:.75rem;font-weight:800;font-size:1rem;border:none;background:linear-gradient(to right,#7c3aed,#db2777);color:white;margin-bottom:.65rem;box-shadow:0 4px 16px rgba(124,58,237,.3);}
.cert-btn:hover{opacity:.9;box-shadow:0 6px 20px rgba(124,58,237,.4);}
.retry-btn{width:100%;padding:.75rem;border-radius:.75rem;font-weight:700;color:#6d28d9;background:#f5f3ff;border:2px solid #ddd6fe;font-size:.95rem;}
.retry-btn:hover{background:#ede9fe;}

/* ── COLOUR UTILITIES ── */
.purple-bg{background:#7c3aed;} .purple-lt{background:#f5f3ff;} .purple-br{border-color:#ddd6fe;} .purple-tx{color:#6d28d9;} .purple-bx{background:#ede9fe;color:#6d28d9;}
.indigo-bg{background:#4338ca;} .indigo-lt{background:#eef2ff;} .indigo-br{border-color:#c7d2fe;} .indigo-tx{color:#4338ca;} .indigo-bx{background:#e0e7ff;color:#4338ca;}
.cyan-bg{background:#0891b2;}   .cyan-lt{background:#ecfeff;}   .cyan-br{border-color:#a5f3fc;}   .cyan-tx{color:#0e7490;}   .cyan-bx{background:#cffafe;color:#0e7490;}
.teal-bg{background:#0d9488;}   .teal-lt{background:#f0fdfa;}   .teal-br{border-color:#99f6e4;}   .teal-tx{color:#0f766e;}   .teal-bx{background:#ccfbf1;color:#0f766e;}
.orange-bg{background:#ea580c;} .orange-lt{background:#fff7ed;} .orange-br{border-color:#fed7aa;} .orange-tx{color:#c2410c;} .orange-bx{background:#ffedd5;color:#c2410c;}
.pink-bg{background:#db2777;}   .pink-lt{background:#fdf2f8;}   .pink-br{border-color:#fbcfe8;}   .pink-tx{color:#be185d;}   .pink-bx{background:#fce7f3;color:#be185d;}
.blue-bg{background:#2563eb;}   .blue-lt{background:#eff6ff;}   .blue-br{border-color:#bfdbfe;}   .blue-tx{color:#1d4ed8;}   .blue-bx{background:#dbeafe;color:#1d4ed8;}
</style>
</head>
<body>

<div class="header">
  <span class="header-float">📱</span>
  <span class="header-float">✍️</span>
  <span class="header-float">🎯</span>
  <p class="header-label">LSC 1103 · Interactive Lab</p>
  <h1>Social Media Communication</h1>
  <small>Purpose · Announcement Types · Hooks · Appeals · Writing</small>
</div>

<div class="card">
  <!-- Student Info Bar -->
  <div class="student-bar">
    <input type="text" id="sname" class="s-input" placeholder="👤 Your Full Name">
    <input type="text" id="sid" class="s-input" placeholder="🆔 Student ID">
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('learn',this)">📚 Learn</button>
    <button class="tab-btn" onclick="switchTab('practice',this)">🎯 Practice</button>
    <button class="tab-btn" onclick="switchTab('create',this)">✍️ Create</button>
    <button class="tab-btn" onclick="switchTab('glossary',this)">🌐 Glossary</button>
  </div>

  <div id="tab-learn" class="tab-content active"></div>

  <div id="tab-practice" class="tab-content">
    <div id="quiz-area"></div>
  </div>

  <div id="tab-create" class="tab-content">
    <p style="font-size:.875rem;font-weight:600;color:#4b5563;margin-bottom:.75rem;">Choose a scenario to write about:</p>
    <div class="sc-grid" id="sc-grid"></div>
    <div id="sc-detail"></div>
  </div>

  <div id="tab-glossary" class="tab-content">
    <div id="glossary-area"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════════ */
const concepts=[
  {group:"📣 Purposes of Social Media Posts",color:"purple",items:[
    {term:"To Inform",icon:"ℹ️",def:"Share facts or knowledge clearly. Answers What? When? Where? Why?",ex:'"Our new opening hours are from 9 AM to 5 PM starting tomorrow."'},
    {term:"To Advertise",icon:"🛒",def:"Promote a product or service. Highlights features, discounts, or benefits.",ex:'"Buy one, get one free! Limited offer on our skincare range."'},
    {term:"To Announce",icon:"📢",def:"Share important updates — new hires, launches, or events.",ex:'"We are thrilled to announce the launch of our new mobile app next week!"'},
    {term:"To Warn",icon:"⚠️",def:"Alert the audience about potential risks or dangers.",ex:'"Beware of phishing emails asking for your personal details."'},
    {term:"To Call for Action",icon:"🙋",def:"Encourage immediate action — sign up, buy, or join.",ex:'"Register today for our webinar and get a free e-book!"'},
    {term:"To Persuade",icon:"💡",def:"Change minds or influence decisions using emotional or logical appeals.",ex:'"Switch to eco-friendly products today to help protect the environment."'},
  ]},
  {group:"📋 7 Types of Announcements",color:"indigo",items:[
    {term:"Product Launch",abbr:"PL",icon:"🚀",def:"Announces a new product or service available for the first time.",ex:'"Totally new, totally you. The iPhone 20 — available now at Apple Stores worldwide."'},
    {term:"Company News",abbr:"CN",icon:"🏢",def:"Shares internal updates, policy changes, or general business news.",ex:'"Office hours are changing during Ramadan. Please check our updated schedule."'},
    {term:"Upcoming Event",abbr:"UE",icon:"📅",def:"Informs the audience about an event that will happen in the future.",ex:'"What\'s up? Come see at the Tech Festival — this Friday, 4–9 PM!"'},
    {term:"Sales & Promotions",abbr:"SP",icon:"🏷️",def:"Highlights discounts, offers, or limited-time deals to drive purchases.",ex:'"Bring a friend. Buy one meal, get one free. This weekend only!"'},
    {term:"Milestones & Achievements",abbr:"MA",icon:"🏆",def:"Celebrates a significant accomplishment or landmark for the organisation.",ex:'"Party with us! City Center is 50 years old and we\'re celebrating all week!"'},
    {term:"Partnerships & Collaborations",abbr:"PC",icon:"🤝",def:"Announces a new relationship or joint venture between two organisations.",ex:'"HSBC & Amazon now work together for you — easier payments, better rewards."'},
    {term:"Hiring Notices",abbr:"HN",icon:"💼",def:"Advertises job openings or calls for applications within the organisation.",ex:'"Jobs, jobs, jobs! Visit Careers For You today and find your perfect role."'},
  ]},
  {group:"🪝 Hooks — Engaging Opening Lines",color:"cyan",items:[
    {term:"What is a Hook?",icon:"🎣",def:"The first sentence designed to grab attention immediately. A good hook makes people want to keep reading.",ex:'"Totally new, totally you." — far more engaging than "We have a new product."'},
    {term:"Hook for Product Launch",icon:"🚀",def:"Tease the product's novelty. Use short, punchy sentences.",ex:'"Totally new, totally you. The iPhone 20."'},
    {term:"Hook for Upcoming Event",icon:"📅",def:"Create curiosity or excitement. Use questions or energy.",ex:'"What\'s up? Come see at the Tech Festival."'},
    {term:"Hook for Sales & Promotions",icon:"🏷️",def:"Lead with the offer. Make the benefit immediately obvious.",ex:'"Bring a friend. Buy one meal, get one free."'},
    {term:"Hook for Milestones & Achievements",icon:"🏆",def:"Invite the audience to share the celebration. Use inclusive language.",ex:'"Party with us! City Center is 50 years old!"'},
    {term:"Hook for Partnerships",icon:"🤝",def:"Lead with both names and the benefit to the audience.",ex:'"HSBC & Amazon now work together for you."'},
    {term:"Hook for Hiring Notices",icon:"💼",def:"Create urgency and excitement. Repetition and action words work well.",ex:'"Jobs, jobs, jobs! Visit Careers For You today."'},
    {term:"Hook for Company News",icon:"🏢",def:"Be clear and direct. Audiences need to know this is important.",ex:'"Office hours are changing during Ramadan."'},
  ]},
  {group:"🎭 Rhetorical Appeals",color:"teal",items:[
    {term:"Logos",icon:"📊",def:"Logic, data, and facts. Use numbers, statistics, and specific figures.",ex:'"Studies show that 90% of people who exercise daily experience improved mental health."'},
    {term:"Ethos",icon:"🏅",def:"Credibility and trust. The writer shows expertise, qualifications, or authority.",ex:'"As a certified nutritionist with 10 years\' experience, I recommend more vegetables."'},
    {term:"Pathos",icon:"❤️",def:"Emotion and feelings. Connects with the audience\'s heart — joy, fear, sympathy.",ex:'"Think of the joy a rescued pet will bring into your home. Adopt today and save a life."'},
  ]},
  {group:"🔍 Key Elements of a Post",color:"orange",items:[
    {term:"Writer",icon:"✍️",def:"The person or organization creating the post.",ex:'"I am launching a 30-day fitness challenge" → Writer is a fitness coach.'},
    {term:"Audience",icon:"👥",def:"The specific group the post is directed towards.",ex:'"Attention all fitness enthusiasts!" → Audience = fitness lovers.'},
    {term:"Message",icon:"💬",def:"The main information or ideas being shared.",ex:'"Our new app is available for download" → the core message.'},
    {term:"Purpose",icon:"🎯",def:"The goal or reason behind the post.",ex:'"Sign up now" → Purpose = Call for Action.'},
    {term:"Context & Culture",icon:"🌍",def:"Background, trends, or societal factors influencing the post.",ex:'"During the holidays" → The time and setting shape the post\'s meaning.'},
  ]},
  {group:"✅ Features of a Good Post",color:"pink",items:[
    {term:"Clarity",icon:"🔍",def:"Easy to understand. Avoid complex language or jargon.",ex:'"Our store is closed on Friday for maintenance."'},
    {term:"Conciseness",icon:"✂️",def:"Brief and to the point. No unnecessary words.",ex:'"50% off all items. Sale ends Sunday."'},
    {term:"Professionalism",icon:"👔",def:"Reflects the tone of the brand. Accurate and respectful.",ex:'"We value your privacy and will never ask for your password."'},
    {term:"Engagement",icon:"🔥",def:"Grabs attention through a hook, humour, a question, or a call to action.",ex:'"What\'s your favourite feature of our new app? Let us know!"'},
    {term:"Structure",icon:"🏗️",def:"Well-organized with the main point clear from the beginning.",ex:'"Join us for our annual fundraiser on Saturday, October 1st, at 5 PM."'},
  ]},
];

const questions=[
  {cat:"Announcement Type",q:'"The university wants to find more qualified teaching staff. Apply now at hct.ac.ae/careers"',opts:["Product Launch","Hiring Notice","Company News","Milestones & Achievements"],ans:1},
  {cat:"Announcement Type",q:'"Baskin Robbins introduces 5 brand-new ice cream flavours this summer. Try them all!"',opts:["Sales & Promotions","Milestones & Achievements","Product Launch","Upcoming Event"],ans:2},
  {cat:"Announcement Type",q:"\"McDonald's sold 1 billion hamburgers worldwide. Thank you for being part of the journey!\"",opts:["Company News","Milestones & Achievements","Product Launch","Partnerships & Collaborations"],ans:1},
  {cat:"Announcement Type",q:'"Starbucks and HCT will work together to bring premium coffee to all 17 campuses."',opts:["Company News","Upcoming Event","Product Launch","Partnerships & Collaborations"],ans:3},
  {cat:"Announcement Type",q:'"The company has a new holiday policy starting January 1st. Read the full update on our portal."',opts:["Hiring Notice","Company News","Upcoming Event","Milestones & Achievements"],ans:1},
  {cat:"Announcement Type",q:"\"The city will hold activities for Children's Day this Saturday in Corniche Park, 9 AM – 6 PM.\"",opts:["Product Launch","Sales & Promotions","Upcoming Event","Company News"],ans:2},
  {cat:"Announcement Type",q:'"KFC will start a special family meal deal this weekend. Get 2 meals + 2 drinks for only AED 49."',opts:["Product Launch","Sales & Promotions","Company News","Hiring Notice"],ans:1},
  {cat:"Hooks",q:"Which hook best fits a Product Launch announcement?",opts:['"Jobs, jobs, jobs! Visit us today."','"Totally new, totally you. The iPhone 20."','"Party with us! We\'re 50 years old!"','"Office hours are changing this month."'],ans:1},
  {cat:"Hooks",q:"Which hook best fits a Milestones & Achievements announcement?",opts:['"What\'s up? Come see at the Tech Festival."','"Bring a friend. Buy one, get one free."','"Party with us! City Center is 50 years old!"','"HSBC & Amazon now work together for you."'],ans:2},

let pool=[],qIdx=0,picked=null,hist=[];
function buildPractice(){
  pool=[...questions].sort(()=>Math.random()-.5).slice(0,18);
  qIdx=0;picked=null;hist=[];renderQ();
}
function renderQ(){
  const area=document.getElementById('quiz-area');
  if(qIdx>=pool.length){renderResult();return;}
  const q=pool[qIdx],c=catColor[q.cat]||'purple',pct=(qIdx/pool.length)*100;
  area.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;">
      <span class="cat-badge ${c}-bx">${q.cat}</span>
      <span style="font-size:.8rem;color:#6b7280;font-weight:600;">${qIdx+1} / ${pool.length}</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar ${c}-bg" style="width:${pct}%"></div></div>
    <div class="q-box ${c}-lt" style="border-color:${solidMap[c]}55;">
      <p style="font-weight:500;color:#1f2937;line-height:1.6;">${q.q}</p>
    </div>
    <div id="opts">
      ${q.opts.map((o,i)=>`
        <button class="opt-btn" id="o${i}" onclick="pick(${i})">
          <span class="opt-letter" id="l${i}">${String.fromCharCode(65+i)}</span>${o}
        </button>`).join('')}
    </div>
    <div id="fb" style="display:none;" class="fb-box"></div>
    <button id="nxt" class="next-btn ${c}-bg" onclick="nextQ()" style="display:none;">
      ${qIdx+1>=pool.length?'See Results →':'Next Question →'}
    </button>`;
}
function pick(i){
  if(picked!==null)return; picked=i;
  const q=pool[qIdx];
  q.opts.forEach((_,idx)=>{
    const b=document.getElementById('o'+idx),l=document.getElementById('l'+idx);
    b.disabled=true;
    if(idx===q.ans){b.className='opt-btn correct';l.textContent='✓';}
    else if(idx===i){b.className='opt-btn wrong';l.textContent='✗';}
    else{b.className='opt-btn faded';l.textContent=String.fromCharCode(65+idx);}
  });
  const fb=document.getElementById('fb');fb.style.display='block';
  if(i===q.ans){fb.className='fb-box fb-ok';fb.textContent='✅ Correct! Well done.';}
  else{fb.className='fb-box fb-bad';fb.textContent='❌ Not quite. The correct answer is: "'+q.opts[q.ans]+'"';}
  document.getElementById('nxt').style.display='block';
}
function nextQ(){hist.push({ok:picked===pool[qIdx].ans});qIdx++;picked=null;renderQ();}

function renderResult(){
  const tot=hist.filter(h=>h.ok).length,pct=Math.round(tot/pool.length*100),pass=pct>=80;
  document.getElementById('quiz-area').innerHTML=`
    <div class="result-wrap">
      <div style="font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;color:#9ca3af;margin-bottom:.4rem;">Your Score</div>
      <div class="result-pct">${pct}%</div>
      <div class="result-label">${pass?'🎉 Excellent Work!':'💪 Keep Practising!'}</div>
      <div style="color:#6b7280;font-size:.875rem;margin-bottom:1.25rem;">You got <strong>${tot}</strong> out of <strong>${pool.length}</strong> correct.</div>
      <div style="margin-bottom:1.5rem;line-height:1;">
        ${hist.map((h,i)=>`<span class="hist-dot" style="background:${h.ok?'#4ade80':'#f87171'}">${i+1}</span>`).join('')}
      </div>
      ${pass?`
      <button class="cert-btn" onclick="generateCertificate(${pct},${tot},${pool.length})">
        🎓 Download My Certificate
      </button>`:''}
      <button class="${pass?'retry-btn':'next-btn'}" style="${pass?'':'background:#7c3aed;'}" onclick="buildPractice()">
        🔄 Try Again
      </button>
    </div>`;
}

let activeSc=null,modelVis=false,bdVis=false;
function buildCreate(){
  document.getElementById('sc-grid').innerHTML=scenarios.map(s=>{
    const abbr=(s.type.match(/\(([^)]+)\)/)||[])[1]||'';
    return `<button class="sc-btn" id="sb${s.id}" onclick="selectSc(${s.id})">
      <div style="font-size:1.5rem;margin-bottom:.25rem;">${s.emoji}</div>
      <div style="font-weight:700;color:${solidMap[s.color]};font-size:.85rem;">${s.title}</div>
      <span class="badge ${s.color}-bx" style="margin-top:.25rem;">${abbr}</span>
    </button>`;
  }).join('');
}
function selectSc(id){
  activeSc=scenarios.find(s=>s.id===id);

  sb.style.borderColor=solidMap[c];sb.style.background=lightMap[c];
  const appealKey=Object.keys(guideMap).find(k=>activeSc.appeal.includes(k))||'Logos';
  const steps=guideMap[appealKey];
  const briefRows=[["📋 Type",activeSc.type],["🎭 Appeal",activeSc.appeal],["✍️ Writer",activeSc.writer],["👥 Audience",activeSc.audience],["🎯 Purpose",activeSc.purpose],["🌍 Context",activeSc.context]];
  document.getElementById('sc-detail').innerHTML=`
    <div style="background:${lightMap[c]};border:2px solid ${solidMap[c]}44;border-radius:1rem;padding:1rem;margin-bottom:1rem;">
      <div style="font-weight:700;font-size:.875rem;color:${solidMap[c]};margin-bottom:.5rem;">📋 Your Scenario Brief</div>
      ${briefRows.map(([l,v])=>`<div class="brief-row"><span class="brief-label">${l}:</span><span class="brief-val">${v}</span></div>`).join('')}

    <div style="background:#f8fafc;border:2px solid #e2e8f0;border-radius:1rem;padding:1rem;margin-bottom:1rem;">
      <div style="font-weight:700;color:#334155;font-size:.875rem;margin-bottom:.75rem;">✏️ How to Write Your Post — ${appealKey} Guide</div>
      ${steps.map(s=>`
        <div style="display:flex;gap:.75rem;margin-bottom:.6rem;align-items:flex-start;">
          <span style="font-weight:700;font-size:.82rem;min-width:2rem;">${s.step}</span>
          <div style="background:white;border:1px solid #e2e8f0;border-radius:.6rem;padding:.5rem .75rem;font-size:.8rem;color:#374151;line-height:1.5;flex:1;">${s.hint}</div>
        </div>`).join('')}
      <div style="margin-top:.6rem;padding:.6rem .75rem;border-radius:.6rem;background:#ede9fe;border:1px solid #ddd6fe;color:#6d28d9;font-size:.78rem;font-weight:600;">

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;">
        <label style="font-size:.875rem;font-weight:600;color:#374151;">✍️ Write your post (target: 50–60 words)</label>

      <div style="font-weight:700;color:#334155;font-size:.875rem;margin-bottom:.6rem;">☑️ Self-Check (<span id="cc">0</span>/${checklist.length})</div>

function updateWC(){
  const t=document.getElementById('pa').value.trim();
  const w=t?t.split(/\s+/).length:0;
  const b=document.getElementById('wcb');
  b.textContent=w+' words';
  b.className='wc-badge '+(w>=50&&w<=60?'wc-ok':w>60?'wc-bad':'wc-neutral');
}
function updateCC(){
  const n=checklist.filter(ck=>document.getElementById('ck-'+ck.id)?.checked).length;
  document.getElementById('cc').textContent=n;
  document.getElementById('ckok').style.display=n===checklist.length?'block':'none';
}
function toggleModel(){
  modelVis=!modelVis;
  document.getElementById('mbox').style.display=modelVis?'block':'none';
  document.getElementById('mb').textContent=modelVis?'🙈 Hide Sample Answer':'👁️ Show Sample Answer';
}
function toggleBd(){
  bdVis=!bdVis;
  document.getElementById('bdbox').style.display=bdVis?'block':'none';
  document.getElementById('bb').textContent=bdVis?'Hide Breakdown':'🔍 See Breakdown';
}

.step{display:flex;gap:.6rem;margin-bottom:.55rem;align-items:flex-start;}.snum{font-weight:700;min-width:2rem;font-size:.82rem;}.shint{background:#f8fafc;border:1px solid #e2e8f0;border-radius:.5rem;padding:.45rem .65rem;font-size:.78rem;color:#374151;flex:1;}
.wctag{display:inline-block;font-size:.72rem;font-weight:700;padding:.1rem .45rem;border-radius:999px;margin-left:.4rem;background:${wcOk?'#ccfbf1':'#fee2e2'};color:${wcOk?'#0f766e':'#dc2626'};}
.answer{font-size:.95rem;line-height:1.8;white-space:pre-wrap;min-height:4rem;color:#111;}.model{font-size:.95rem;line-height:1.8;font-style:italic;color:#111;}

/* ═══════════════════════════════════════════════════
   GLOSSARY
═══════════════════════════════════════════════════ */
let activeCat='all';
function buildGlossary(){
  const area=document.getElementById('glossary-area');
  const cats=[...new Set(glossaryTerms.map(t=>t.cat))];
  area.innerHTML=`
    <div style="margin-bottom:.75rem;">
      <input type="text" id="gSearch" class="g-search" placeholder="🔍 Search English or Arabic…" oninput="filterGlossary()">
    </div>
    <div class="cat-pills">
      <button class="cat-pill active" onclick="setCat('all',this)">All (${glossaryTerms.length})</button>
      ${cats.map(c=>`<button class="cat-pill" onclick="setCat('${c}',this)">${c}</button>`).join('')}
    </div>
    <div id="gCards"></div>`;
  renderGlossaryCards('all','');
}
function setCat(cat,btn){
  activeCat=cat;
  document.querySelectorAll('.cat-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterGlossary();
}
function filterGlossary(){
  const q=(document.getElementById('gSearch')?.value||'').toLowerCase();
  renderGlossaryCards(activeCat,q);
}
function renderGlossaryCards(cat,q){
  const filtered=glossaryTerms.filter(t=>{
    const matchCat=cat==='all'||t.cat===cat;
    const matchQ=!q||t.en.toLowerCase().includes(q)||t.ar.includes(q)||t.def.toLowerCase().includes(q)||t.ardef.includes(q);
    return matchCat&&matchQ;
  });
  const area=document.getElementById('gCards');
  if(!filtered.length){
    area.innerHTML=`<div class="g-empty">No terms found. Try a different search.</div>`;return;
  }
  area.innerHTML=filtered.map(t=>`
    <div class="g-card" style="border-color:${solidMap[t.color]}44;">
      <div class="g-card-inner">
        <div class="g-en" style="border-right:2px solid ${solidMap[t.color]}22;">
          <div class="g-cat" style="color:${solidMap[t.color]};">${t.cat}</div>
          <div class="g-term">${t.en}</div>
          <div class="g-def">${t.def}</div>
        </div>
        <div class="g-ar" style="background:${lightMap[t.color]};">
          <div class="g-cat" style="color:${solidMap[t.color]};">عربي</div>
          <div class="g-term" style="font-size:1.05rem;">${t.ar}</div>
          <div class="g-def">${t.ardef}</div>
        </div>
      </div>
    </div>`).join('');
}
