  {

    ]

/* ── LEARN ─────────────────────────────────────────────────────────── */
function LearnSection() {
  const [open, setOpen] = useState({});
  const tog = (g,i) => setOpen(p=>({...p,[`${g}-${i}`]:!p[`${g}-${i}`]}));
  return (
    <div style={{display:"flex",flexDirection:"column",gap:"1.25rem"}}>
      {concepts.map((grp,gi)=>{
        const p=PAL[grp.color];
        return (
          <div key={gi} style={{borderRadius:"1rem",border:`2px solid ${p.border}`,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
            <div style={{background:p.bg,color:"white",padding:"0.75rem 1.25rem",fontWeight:700,fontSize:"1rem"}}>{grp.group}</div>
            {grp.items.map((item,ii)=>{
              const isOpen=!!open[`${gi}-${ii}`];
              return (
                <div key={ii} style={{borderTop:ii>0?`1px solid ${p.border}`:"none",background:p.light}}>
                  <button onClick={()=>tog(gi,ii)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0.7rem 1.25rem",background:"transparent",border:"none",textAlign:"left"}}>
                    <span style={{display:"flex",alignItems:"center",gap:"0.5rem",fontWeight:600,color:p.text}}>
                      <span>{item.icon}</span><span>{item.term}</span>
                      {item.abbr&&<span style={{fontSize:"0.7rem",fontWeight:700,padding:"0.1rem 0.5rem",borderRadius:"999px",background:p.badgeBg,color:p.badgeText}}>{item.abbr}</span>}
                    </span>
                    <span style={{display:"inline-block",transform:isOpen?"rotate(90deg)":"rotate(0deg)",transition:"transform 0.2s",color:"#9ca3af",fontSize:"1.2rem"}}>›</span>
                  </button>
                  {isOpen&&(
                    <div style={{padding:"0 1.25rem 0.9rem 1.25rem",display:"flex",flexDirection:"column",gap:"0.5rem"}}>
                      <p style={{color:"#374151",fontSize:"0.875rem"}}>{item.def}</p>
                      <div style={{fontSize:"0.75rem",fontStyle:"italic",padding:"0.5rem 0.75rem",borderRadius:"0.5rem",background:p.badgeBg,color:p.badgeText,border:`1px solid ${p.border}`}}>📌 {item.ex}</div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      })}

          </thead>

            {[["PL","Product Launch","New product or service available"],["CN","Company News","Policy, internal updates, changes"],["UE","Upcoming Event","Future event details"],["SP","Sales & Promotions","Discounts, deals, offers"],["MA","Milestones & Achievements","Celebrating success"],["PC","Partnerships & Collaborations","New joint ventures"],["HN","Hiring Notices","Job openings & applications"]].map(([a,t,d],i)=>(
              <tr key={a} style={{borderTop:"1px solid #e0e7ff",background:i%2===0?"white":"#f5f7ff"}}>
                <td style={{padding:"0.5rem 0.75rem",fontWeight:700,color:"#4338ca"}}>{a}</td>
                <td style={{padding:"0.5rem 0.75rem",color:"#1f2937"}}>{t}</td>
                <td style={{padding:"0.5rem 0.75rem",color:"#6b7280"}}>{d}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── PRACTICE ──────────────────────────────────────────────────────── */
function PracticeSection() {
  const [pool] = useState(()=>[...questions].sort(()=>Math.random()-0.5).slice(0,18));
  const [idx, setIdx] = useState(0);
  const [sel, setSel] = useState(null);
  const [done, setDone] = useState(false);
  const [hist, setHist] = useState([]);

  const q=pool[idx];
  const p=PAL[catColor[q?.cat]||"purple"];
  const correct=sel===q?.ans;

  const next=()=>{
    setHist(h=>[...h,{ok:sel===q.ans}]);
    if(idx+1>=pool.length) setDone(true);
    else{setIdx(i=>i+1);setSel(null);}
  };
  const restart=()=>{setIdx(0);setSel(null);setDone(false);setHist([]);};

  if(done){
    const total=hist.filter(h=>h.ok).length;
    const pct=Math.round((total/pool.length)*100);
    return (
      <div style={{textAlign:"center",padding:"2rem 0",display:"flex",flexDirection:"column",alignItems:"center",gap:"1rem"}}>
        <div style={{fontSize:"3.5rem",fontWeight:900,color:pct>=80?"#14b8a6":"#f97316"}}>{pct}%</div>
        <p style={{fontSize:"1.4rem",fontWeight:700,color:"#1f2937"}}>{pct>=80?"🎉 Excellent work!":"💪 Keep practising!"}</p>
        <p style={{color:"#6b7280"}}>You got {total} out of {pool.length} correct.</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:"0.4rem",justifyContent:"center",maxWidth:"18rem"}}>
          {hist.map((h,i)=><div key={i} style={{width:"2.2rem",height:"2.2rem",borderRadius:"50%",background:h.ok?"#4ade80":"#f87171",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:"0.75rem"}}>{i+1}</div>)}
        </div>
        <button onClick={restart} style={{background:"#7c3aed",color:"white",fontWeight:700,padding:"0.75rem 2rem",borderRadius:"0.75rem",border:"none",fontSize:"1rem"}}>🔄 Try Again</button>
      </div>
    );
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:"1rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:"0.75rem",fontWeight:700,padding:"0.2rem 0.75rem",borderRadius:"999px",background:p.badgeBg,color:p.badgeText}}>{q.cat}</span>
        <span style={{fontSize:"0.875rem",color:"#6b7280"}}>{idx+1} / {pool.length}</span>
      </div>
      <div style={{background:"#e5e7eb",borderRadius:"999px",height:"0.5rem"}}>
        <div style={{background:p.bg,height:"0.5rem",borderRadius:"999px",width:`${(idx/pool.length)*100}%`,transition:"width 0.3s"}}/>
      </div>
      <div style={{background:p.light,border:`2px solid ${p.border}`,borderRadius:"1rem",padding:"1.1rem 1.25rem"}}>
        <p style={{fontWeight:500,color:"#1f2937",lineHeight:1.6}}>{q.q}</p>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.6rem"}}>
        {q.opts.map((opt,i)=>{
          let bg="#fff",border="2px solid #e5e7eb",color="#374151";
          if(sel!==null){
            if(i===q.ans){bg="#f0fdf4";border="2px solid #4ade80";color="#166534";}
            else if(i===sel){bg="#fef2f2";border="2px solid #f87171";color="#991b1b";}
            else{bg="#f9fafb";color="#9ca3af";}
          }
          return (
            <button key={i} onClick={()=>{if(sel===null)setSel(i);}} style={{width:"100%",textAlign:"left",padding:"0.75rem 1.1rem",borderRadius:"0.75rem",border,background:bg,color,display:"flex",alignItems:"center",gap:"0.75rem",fontWeight:500}}>
              <span style={{width:"1.75rem",height:"1.75rem",borderRadius:"50%",background:"#f3f4f6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.75rem",fontWeight:700,flexShrink:0}}>
                {sel!==null?(i===q.ans?"✓":i===sel?"✗":String.fromCharCode(65+i)):String.fromCharCode(65+i)}
              </span>
              {opt}
            </button>
          );
        })}
      </div>
      {sel!==null&&(
        <div style={{padding:"0.75rem 1rem",borderRadius:"0.75rem",background:correct?"#f0fdf4":"#fef2f2",border:correct?"1px solid #bbf7d0":"1px solid #fecaca",color:correct?"#166534":"#991b1b",fontWeight:500,fontSize:"0.875rem"}}>
          {correct?"✅ Correct! Well done.":`❌ Not quite. The correct answer is: "${q.opts[q.ans]}"`}
        </div>
      )}
      <button onClick={next} disabled={sel===null} style={{width:"100%",padding:"0.75rem",borderRadius:"0.75rem",fontWeight:700,color:"white",background:sel!==null?p.bg:"#d1d5db",border:"none",fontSize:"1rem",cursor:sel!==null?"pointer":"not-allowed"}}>
        {idx+1>=pool.length?"See Results →":"Next Question →"}
      </button>
    </div>
  );
}

/* ── PRINT ─────────────────────────────────────────────────────────── */
function handlePrint(sc, text, wc, checks) {
  const checkedItems = checklist.filter(c=>checks[c.id]);
  const uncheckedItems = checklist.filter(c=>!checks[c.id]);
  const win = window.open("","_blank");
  win.document.write(`<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<title>LSC 1103 – Writing Task: ${sc.title}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  h1 { font-size: 1.3rem; font-weight: 800; margin-bottom: 0.2rem; }
  .subtitle { color: #6b7280; font-size: 0.8rem; margin-bottom: 1.5rem; }
  .section { border: 2px solid #e5e7eb; border-radius: 0.75rem; padding: 1rem 1.2rem; margin-bottom: 1.2rem; }
  .section-title { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.6rem; }

  .brief-label { color: #6b7280; min-width: 5rem; flex-shrink: 0; }
  .brief-val { font-weight: 600; }
  .tip { margin-top: 0.6rem; font-size: 0.8rem; color: #6b7280; font-style: italic; }
  .student-text { font-size: 0.95rem; line-height: 1.8; color: #111827; white-space: pre-wrap; }
  .wc { display: inline-block; font-size: 0.75rem; font-weight: 700; padding: 0.15rem 0.6rem; border-radius: 999px; margin-left: 0.5rem; }
  .wc-ok { background: #ccfbf1; color: #0f766e; }
  .wc-bad { background: #fee2e2; color: #dc2626; }
  .model-text { font-size: 0.95rem; line-height: 1.8; color: #111827; font-style: italic; }
  .breakdown-item { padding: 0.5rem 0.75rem; border-radius: 0.4rem; border: 1px solid #e0e7ff; margin-bottom: 0.4rem; font-size: 0.8rem; background: #f5f7ff; }
  .breakdown-label { font-weight: 700; color: #4338ca; }
  .check-row { font-size: 0.8rem; display: flex; gap: 0.4rem; margin-bottom: 0.25rem; }
  .ok { color: #15803d; }
  .miss { color: #dc2626; }
  .divider { border: none; border-top: 2px dashed #e5e7eb; margin: 1.2rem 0; }
  .header-bar { background: linear-gradient(to right, #7c3aed, #db2777); color: white; padding: 1rem 1.2rem; border-radius: 0.75rem; margin-bottom: 1.5rem; }
  .header-bar h1 { font-size: 1.1rem; }
  .header-bar p { font-size: 0.75rem; opacity: 0.85; margin-top: 0.2rem; }
  @media print { body { padding: 1.5rem; } button { display: none; } }
</style>
</head><body>
<div class="header-bar">
  <h1>LSC 1103 – Social Media Communication Lab</h1>
  <p>Writing Task: ${sc.title} &nbsp;|&nbsp; ${sc.type} &nbsp;|&nbsp; ${sc.appeal}</p>
</div>

<div class="section" style="border-color:#c7d2fe;">
  <div class="section-title" style="color:#4338ca;">📋 Scenario Brief</div>
  <div class="brief-row"><span class="brief-label">Type:</span><span class="brief-val">${sc.type}</span></div>
  <div class="brief-row"><span class="brief-label">Appeal:</span><span class="brief-val">${sc.appeal}</span></div>
  <div class="brief-row"><span class="brief-label">Writer:</span><span class="brief-val">${sc.writer}</span></div>
  <div class="brief-row"><span class="brief-label">Audience:</span><span class="brief-val">${sc.audience}</span></div>
  <div class="brief-row"><span class="brief-label">Purpose:</span><span class="brief-val">${sc.purpose}</span></div>
  <div class="brief-row"><span class="brief-label">Context:</span><span class="brief-val">${sc.context}</span></div>
  <div class="tip">💡 ${sc.tip}</div>
</div>

<div class="section" style="border-color:#ddd6fe;">
  <div class="section-title" style="color:#6d28d9;">✍️ My Answer <span class="wc ${wc>=50&&wc<=60?'wc-ok':'wc-bad'}">${wc} words</span></div>
  <div class="student-text">${text.trim()||"(no answer written)"}</div>
</div>

<div class="section" style="border-color:#e5e7eb;">
  <div class="section-title" style="color:#374151;">☑️ Self-Check</div>
  ${checkedItems.map(c=>`<div class="check-row"><span class="ok">✓</span> ${c.label}</div>`).join("")}
  ${uncheckedItems.map(c=>`<div class="check-row"><span class="miss">✗</span> ${c.label}</div>`).join("")}
</div>

<hr class="divider"/>

<div class="section" style="border-color:#fde047;background:#fefce8;">
  <div class="section-title" style="color:#854d0e;">📝 Model Answer</div>
  <div class="model-text">${sc.model}</div>
</div>

<div class="section" style="border-color:#c7d2fe;background:#eef2ff;">
  <div class="section-title" style="color:#4338ca;">🔍 Why the Model Answer Works</div>
  ${sc.breakdown.map(b=>`<div class="breakdown-item"><span class="breakdown-label">${b.label}: </span>${b.note}</div>`).join("")}

<div style="text-align:center;margin-top:1.5rem;font-size:0.75rem;color:#9ca3af;">

  win.document.close();

/* ── CREATE ────────────────────────────────────────────────────────── */
function CreateSection() {
  const [picked, setPicked] = useState(null);
  const [text, setText] = useState("");
  const [checks, setChecks] = useState({});
  const [showModel, setShowModel] = useState(false);
  const [showBreakdown, setShowBreakdown] = useState(false);

  const sc = scenarios.find(s=>s.id===picked);
  const p = sc ? PAL[sc.color] : null;
  const wc = text.trim().split(/\s+/).filter(Boolean).length;
  const checkedCount = Object.values(checks).filter(Boolean).length;

  const selectScenario = (id) => {
    setPicked(id); setText(""); setChecks({}); setShowModel(false); setShowBreakdown(false);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:"1rem"}}>
      <p style={{fontSize:"0.875rem",fontWeight:600,color:"#4b5563"}}>Choose a scenario to write about:</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.75rem"}}>
        {scenarios.map(s=>{
          const sp=PAL[s.color]; const sel=picked===s.id;
          const abbr=s.type.match(/\(([^)]+)\)/)?.[1]||"";
          return (
            <button key={s.id} onClick={()=>selectScenario(s.id)}
              style={{padding:"0.75rem",borderRadius:"0.75rem",border:sel?`2px solid ${sp.bg}`:"2px solid #e5e7eb",background:sel?sp.light:"white",textAlign:"left",boxShadow:sel?`0 0 0 2px ${sp.bg}44`:"none"}}>
              <div style={{fontSize:"1.5rem",marginBottom:"0.25rem"}}>{s.emoji}</div>
              <div style={{fontSize:"0.875rem",fontWeight:700,color:sel?sp.text:"#1f2937"}}>{s.title}</div>
              <div style={{display:"inline-block",marginTop:"0.25rem",fontSize:"0.7rem",fontWeight:700,padding:"0.1rem 0.5rem",borderRadius:"999px",background:sel?sp.badgeBg:"#f3f4f6",color:sel?sp.badgeText:"#6b7280"}}>{abbr}</div>
            </button>
          );
        })}
      </div>

      {sc&&(
        <>
          {/* Brief */}
          <div style={{background:p.light,border:`2px solid ${p.border}`,borderRadius:"1rem",padding:"1rem"}}>
            <p style={{fontWeight:700,color:p.text,fontSize:"0.875rem",marginBottom:"0.5rem"}}>📋 Your Scenario Brief</p>
            {[["📋 Type",sc.type],["🎭 Appeal",sc.appeal],["✍️ Writer",sc.writer],["👥 Audience",sc.audience],["🎯 Purpose",sc.purpose],["🌍 Context",sc.context]].map(([l,v])=>(
              <div key={l} style={{display:"flex",gap:"0.5rem",marginBottom:"0.25rem",fontSize:"0.875rem"}}>
                <span style={{color:"#6b7280",minWidth:"5.5rem",flexShrink:0}}>{l}:</span>
                <span style={{color:"#1f2937",fontWeight:500}}>{v}</span>
              </div>
            ))}
            <p style={{marginTop:"0.5rem",fontSize:"0.75rem",color:"#6b7280",fontStyle:"italic"}}>💡 {sc.tip}</p>
          </div>

          {/* Textarea */}
          <div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"0.4rem"}}>
              <label style={{fontSize:"0.875rem",fontWeight:600,color:"#374151"}}>✍️ Write your post (target: 50–60 words)</label>
              <span style={{fontSize:"0.75rem",fontWeight:700,padding:"0.2rem 0.6rem",borderRadius:"999px",background:wc>=50&&wc<=60?"#ccfbf1":wc>60?"#fee2e2":"#f3f4f6",color:wc>=50&&wc<=60?"#0f766e":wc>60?"#dc2626":"#6b7280"}}>{wc} words</span>
            </div>
            <textarea value={text} onChange={e=>setText(e.target.value)} rows={5}
              placeholder="Start with a strong hook! Then include your message, details, and a call to action..."
              style={{width:"100%",border:"2px solid #e5e7eb",borderRadius:"0.75rem",padding:"0.9rem",fontSize:"0.875rem",lineHeight:1.6,resize:"none",outline:"none",color:"#1f2937"}}/>
          </div>

          {/* Self-check */}
          <div style={{background:"#f8fafc",border:"2px solid #e2e8f0",borderRadius:"1rem",padding:"1rem"}}>
            <p style={{fontWeight:700,color:"#334155",fontSize:"0.875rem",marginBottom:"0.6rem"}}>☑️ Self-Check ({checkedCount}/{checklist.length})</p>
            {checklist.map(c=>(
              <label key={c.id} style={{display:"flex",alignItems:"center",gap:"0.6rem",marginBottom:"0.4rem",cursor:"pointer",fontSize:"0.875rem",color:"#374151"}}>
                <input type="checkbox" checked={!!checks[c.id]} onChange={e=>setChecks(prev=>({...prev,[c.id]:e.target.checked}))}
                  style={{width:"1.1rem",height:"1.1rem",accentColor:p.bg,cursor:"pointer"}}/>
                <span style={{color:checks[c.id]?p.text:"#374151",fontWeight:checks[c.id]?600:400}}>{c.label}</span>
              </label>
            ))}
            {checkedCount===checklist.length&&(
              <div style={{marginTop:"0.6rem",padding:"0.6rem 0.75rem",borderRadius:"0.6rem",background:"#f0fdf4",border:"1px solid #bbf7d0",color:"#166534",fontSize:"0.8rem",fontWeight:600}}>
                ✅ Great job checking your work! Now compare with the model answer below.
              </div>
            )}
          </div>

          {/* Reveal buttons */}
          <div style={{display:"flex",gap:"0.75rem"}}>
            <button onClick={()=>setShowModel(!showModel)}
              style={{flex:1,padding:"0.75rem",borderRadius:"0.75rem",fontWeight:700,color:"white",background:p.bg,border:"none",fontSize:"0.95rem"}}>
              {showModel?"🙈 Hide Model Answer":"👁️ Show Model Answer"}
            </button>
            <button onClick={()=>setShowBreakdown(!showBreakdown)}
              style={{flex:1,padding:"0.75rem",borderRadius:"0.75rem",fontWeight:700,color:p.text,background:p.light,border:`2px solid ${p.border}`,fontSize:"0.95rem"}}>
              {showBreakdown?"Hide Breakdown":"🔍 See Breakdown"}
            </button>
          </div>

          {/* Print button */}
          {text.trim().length>0&&(
            <button onClick={()=>handlePrint(sc,text,wc,checks)}
              style={{width:"100%",padding:"0.75rem",borderRadius:"0.75rem",fontWeight:700,color:"#374151",background:"#f8fafc",border:"2px solid #e2e8f0",fontSize:"0.95rem",display:"flex",alignItems:"center",justifyContent:"center",gap:"0.5rem"}}>
              🖨️ Print My Answer & Model
            </button>
          )}

          {/* Model answer */}
          {showModel&&(
            <div style={{background:"#fefce8",border:"2px solid #fde047",borderRadius:"0.75rem",padding:"1rem",fontSize:"0.9rem",lineHeight:1.7,color:"#374151"}}>
              <p style={{fontWeight:700,color:"#854d0e",fontSize:"0.75rem",marginBottom:"0.4rem"}}>📝 MODEL ANSWER</p>
              {sc.model}
            </div>
          )}

          {/* Breakdown */}
          {showBreakdown&&(
            <div style={{background:p.light,border:`2px solid ${p.border}`,borderRadius:"0.75rem",padding:"1rem"}}>
              <p style={{fontWeight:700,color:p.text,fontSize:"0.875rem",marginBottom:"0.6rem"}}>🔍 Why this model answer works</p>
              {sc.breakdown.map((b,i)=>(
                <div key={i} style={{marginBottom:"0.5rem",padding:"0.6rem 0.75rem",background:"white",borderRadius:"0.5rem",border:`1px solid ${p.border}`}}>
                  <span style={{fontWeight:700,color:p.text,fontSize:"0.8rem"}}>{b.label}: </span>
                  <span style={{fontSize:"0.8rem",color:"#4b5563"}}>{b.note}</span>
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </div>
  );
}
