// ─── DATA ─────────────────────────────────────────────────────────────
const concepts = [
  {
    group: "📣 Purposes of Social Media Posts", color: "purple",
    items: [
      { term: "To Inform",          icon: "ℹ️", def: "Share facts or knowledge clearly. Answers What? When? Where? Why?", ex: "\"Our new opening hours are from 9 AM to 5 PM starting tomorrow.\"" },
      { term: "To Advertise",       icon: "🛒", def: "Promote a product or service. Highlights features, discounts, or benefits.", ex: "\"Buy one, get one free! Limited offer on our skincare range.\"" },
      { term: "To Announce",        icon: "📢", def: "Share important updates — new hires, launches, or events.", ex: "\"We are thrilled to announce the launch of our new mobile app next week!\"" },
      { term: "To Warn",            icon: "⚠️", def: "Alert the audience about potential risks or dangers.", ex: "\"Beware of phishing emails asking for your personal details.\"" },
      { term: "To Call for Action", icon: "🙋", def: "Encourage immediate action — sign up, buy, or join.", ex: "\"Register today for our webinar and get a free e-book!\"" },
      { term: "To Persuade",        icon: "💡", def: "Change minds or influence decisions using emotional or logical appeals.", ex: "\"Switch to eco-friendly products today to help protect the environment.\"" },
    ]
  },
  {
    group: "📋 7 Types of Announcements", color: "indigo",
    items: [
      { term: "Product Launch",               abbr: "PL", icon: "🚀", def: "Announces a new product or service available for the first time.", ex: "\"Totally new, totally you. The iPhone 20 — available now at Apple Stores worldwide.\"" },
      { term: "Company News",                 abbr: "CN", icon: "🏢", def: "Shares internal updates, policy changes, or general business news.", ex: "\"Office hours are changing during Ramadan. Please check our updated schedule.\"" },
      { term: "Upcoming Event",               abbr: "UE", icon: "📅", def: "Informs the audience about an event that will happen in the future.", ex: "\"What's up? Come see at the Tech Festival — this Friday, 4–9 PM!\"" },
      { term: "Sales & Promotions",           abbr: "SP", icon: "🏷️", def: "Highlights discounts, offers, or limited-time deals to drive purchases.", ex: "\"Bring a friend. Buy one meal, get one free. This weekend only!\"" },
      { term: "Milestones & Achievements",    abbr: "MA", icon: "🏆", def: "Celebrates a significant accomplishment or landmark for the organisation.", ex: "\"Party with us! City Center is 50 years old and we're celebrating all week!\"" },
      { term: "Partnerships & Collaborations",abbr: "PC", icon: "🤝", def: "Announces a new relationship or joint venture between two organisations.", ex: "\"HSBC & Amazon now work together for you — easier payments, better rewards.\"" },
      { term: "Hiring Notices",               abbr: "HN", icon: "💼", def: "Advertises job openings or calls for applications within the organisation.", ex: "\"Jobs, jobs, jobs! Visit Careers For You today and find your perfect role.\"" },
    ]
  },
  {
    group: "🪝 Hooks — Engaging Opening Lines", color: "cyan",
    items: [
      { term: "What is a Hook?",                    icon: "🎣", def: "A hook is the first sentence of a post designed to grab the reader's attention immediately.", ex: "\"Totally new, totally you.\" — far more engaging than \"We have a new product.\"" },
      { term: "Hook for Product Launch",             icon: "🚀", def: "Tease the product's novelty. Use short, punchy sentences.", ex: "\"Totally new, totally you. The iPhone 20.\"" },
      { term: "Hook for Upcoming Event",             icon: "📅", def: "Create curiosity or excitement. Use questions or energy.", ex: "\"What's up? Come see at the Tech Festival.\"" },
      { term: "Hook for Sales & Promotions",         icon: "🏷️", def: "Lead with the offer. Make the benefit immediately obvious.", ex: "\"Bring a friend. Buy one meal, get one free.\"" },
      { term: "Hook for Milestones & Achievements",  icon: "🏆", def: "Invite the audience to share the celebration. Use inclusive language.", ex: "\"Party with us! City Center is 50 years old!\"" },
      { term: "Hook for Partnerships",               icon: "🤝", def: "Lead with both names and the benefit to the audience.", ex: "\"HSBC & Amazon now work together for you.\"" },
      { term: "Hook for Hiring Notices",             icon: "💼", def: "Create urgency and excitement. Repetition and action words work well.", ex: "\"Jobs, jobs, jobs! Visit Careers For You today.\"" },
      { term: "Hook for Company News",               icon: "🏢", def: "Be clear and direct. Audiences need to know this is important.", ex: "\"Office hours are changing during Ramadan.\"" },
    ]
  },
  {
    group: "🎭 Rhetorical Appeals", color: "teal",
    items: [
      { term: "Logos", icon: "📊", def: "Logic, data, and facts. Use numbers, statistics, and specific figures. Look for: percentages, times, quantities, research results.", ex: "\"Studies show that 90% of people who exercise daily experience improved mental health.\"" },
      { term: "Ethos", icon: "🏅", def: "Credibility and trust. The writer shows expertise, qualifications, or authority. Look for: job titles, years of experience, certifications.", ex: "\"As a certified nutritionist with 10 years' experience, I recommend more vegetables in your diet.\"" },
      { term: "Pathos",icon: "❤️", def: "Emotion and feelings. Connects with the audience's heart — joy, fear, sympathy. Look for: emotional language, personal stories, values.", ex: "\"Think of the joy a rescued pet will bring into your home. Adopt today and save a life.\"" },
    ]
  },
  {
    group: "🔍 Key Elements of a Post", color: "orange",
    items: [
      { term: "Writer",            icon: "✍️", def: "The person or organization creating the post.", ex: "\"I am launching a 30-day fitness challenge\" → Writer is a fitness coach." },
      { term: "Audience",          icon: "👥", def: "The specific group the post is directed towards.", ex: "\"Attention all fitness enthusiasts!\" → Audience = fitness lovers." },

  {
    group: "✅ Features of a Good Post", color: "pink",
    items: [
      { term: "Clarity",         icon: "🔍", def: "Easy to understand. Avoid complex language or jargon.", ex: "\"Our store is closed on Friday for maintenance.\"" },
      { term: "Conciseness",     icon: "✂️", def: "Brief and to the point. No unnecessary words.", ex: "\"50% off all items. Sale ends Sunday.\"" },
      { term: "Professionalism", icon: "👔", def: "Reflects the tone of the brand. Accurate and respectful.", ex: "\"We value your privacy and will never ask for your password.\"" },
      { term: "Engagement",      icon: "🔥", def: "Grabs attention through a hook, humour, a question, or a call to action.", ex: "\"What's your favourite feature of our new app? Let us know!\"" },
      { term: "Structure",       icon: "🏗️", def: "Well-organized with the main point clear from the beginning.", ex: "\"Join us for our annual fundraiser on Saturday, October 1st, at 5 PM.\"" },
    ]
  }
];

const scenarios = [

const C = {

  cyan:  { bg:"bg-cyan-500",   light:"bg-cyan-50",   border:"border-cyan-200",   text:"text-cyan-700",   badge:"bg-cyan-100 text-cyan-700",   btn:"bg-cyan-500 hover:bg-cyan-600",   ring:"ring-cyan-400" },
  teal:  { bg:"bg-teal-500",   light:"bg-teal-50",   border:"border-teal-200",   text:"text-teal-700",   badge:"bg-teal-100 text-teal-700",   btn:"bg-teal-500 hover:bg-teal-600",   ring:"ring-teal-400" },
  orange:{ bg:"bg-orange-500", light:"bg-orange-50", border:"border-orange-200", text:"text-orange-700", badge:"bg-orange-100 text-orange-700", btn:"bg-orange-500 hover:bg-orange-600", ring:"ring-orange-400" },
  pink:  { bg:"bg-pink-500",   light:"bg-pink-50",   border:"border-pink-200",   text:"text-pink-700",   badge:"bg-pink-100 text-pink-700",   btn:"bg-pink-500 hover:bg-pink-600",   ring:"ring-pink-400" },
  blue:  { bg:"bg-blue-500",   light:"bg-blue-50",   border:"border-blue-200",   text:"text-blue-700",   badge:"bg-blue-100 text-blue-700",   btn:"bg-blue-500 hover:bg-blue-600",   ring:"ring-blue-400" },
};
const catColors = { "Announcement Type":"indigo", "Hooks":"cyan", "Purpose":"purple", "Rhetorical Appeal":"teal", "Post Elements":"orange", "Post Quality":"pink" };

// ─── LEARN ────────────────────────────────────────────────────────────
function LearnSection() {
  const [open, setOpen] = useState({});
  const toggle = (g, i) => { const k=`${g}-${i}`; setOpen(p=>({...p,[k]:!p[k]})); };
  return (
    <div className="space-y-6">
      {concepts.map((group, gi) => {
        const cl = C[group.color];
        return (
          <div key={gi} className={`rounded-2xl border-2 ${cl.border} overflow-hidden shadow-sm`}>
            <div className={`${cl.bg} text-white px-5 py-3 font-bold text-lg`}>{group.group}</div>
            <div className={`${cl.light} divide-y ${cl.border}`}>
              {group.items.map((item, ii) => {
                const isOpen = open[`${gi}-${ii}`];
                return (
                  <div key={ii}>
                    <button onClick={()=>toggle(gi,ii)} className="w-full flex items-center justify-between px-5 py-3 text-left hover:bg-white" style={{background:'transparent'}}>
                      <span className="font-semibold flex items-center gap-2">
                        <span>{item.icon}</span>
                        <span className={cl.text}>{item.term}</span>
                        {item.abbr && <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${cl.badge}`}>{item.abbr}</span>}
                      </span>
                      <span className="text-gray-400 text-lg" style={{display:'inline-block',transition:'transform 0.2s',transform:isOpen?'rotate(90deg)':'rotate(0deg)'}}>›</span>
                    </button>
                    {isOpen && (
                      <div className="px-5 pb-4 space-y-2">
                        <p className="text-gray-700 text-sm">{item.def}</p>
                        <div className={`text-xs italic px-3 py-2 rounded-lg ${cl.badge} border ${cl.border}`}>📌 {item.ex}</div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
      <div className="rounded-2xl border-2 border-indigo-200 overflow-hidden shadow-sm">
        <div className="bg-indigo-500 text-white px-5 py-3 font-bold text-lg">📊 Quick Reference — 7 Announcement Types</div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-indigo-50 text-indigo-700 font-bold">
              <tr><th className="px-3 py-2 text-left">Abbr.</th><th className="px-3 py-2 text-left">Type</th><th className="px-3 py-2 text-left">Key Purpose</th></tr>
            </thead>
            <tbody className="divide-y divide-indigo-100">
              {[["PL","Product Launch","New product or service available"],["CN","Company News","Policy, internal updates, changes"],["UE","Upcoming Event","Future event details"],["SP","Sales & Promotions","Discounts, deals, offers"],["MA","Milestones & Achievements","Celebrating success"],["PC","Partnerships & Collaborations","New joint ventures"],["HN","Hiring Notices","Job openings & applications"]].map(([a,t,p])=>(
                <tr key={a}><td className="px-3 py-2 font-bold text-indigo-600">{a}</td><td className="px-3 py-2 text-gray-800">{t}</td><td className="px-3 py-2 text-gray-600">{p}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── PRACTICE ─────────────────────────────────────────────────────────
function PracticeSection() {
  const [pool] = useState(()=>[...questions].sort(()=>Math.random()-0.5).slice(0,18));
  const [idx, setIdx] = useState(0);
  const [sel, setSel] = useState(null);
  const [done, setDone] = useState(false);
  const [history, setHistory] = useState([]);

  const q = pool[idx];
  const cl = C[catColors[q?.cat]||"purple"];

  const next = () => {
    setHistory(h=>[...h,{correct:sel===q.ans}]);
    if(idx+1>=pool.length) setDone(true);
    else { setIdx(i=>i+1); setSel(null); }
  };
  const restart = () => { setIdx(0); setSel(null); setDone(false); setHistory([]); };

  if(done) {
    const total = history.filter(h=>h.correct).length;
    const pct = Math.round((total/pool.length)*100);
    return (
      <div className="text-center space-y-5 py-8">
        <div className={`text-6xl font-black ${pct>=80?'text-teal-500':'text-orange-500'}`}>{pct}%</div>
        <p className="text-2xl font-bold text-gray-700">{pct>=80?"🎉 Excellent work!":"💪 Keep practising!"}</p>
        <p className="text-gray-500">You got {total} out of {pool.length} correct.</p>
        <div className="flex flex-wrap gap-2 justify-center max-w-xs mx-auto">
          {history.map((h,i)=><div key={i} className={`w-9 h-9 rounded-full flex items-center justify-center text-white font-bold text-xs ${h.correct?'bg-teal-400':'bg-red-400'}`}>{i+1}</div>)}
        </div>
        <button onClick={restart} className="bg-purple-500 text-white font-bold px-8 py-3 rounded-xl">🔄 Try Again</button>
      </div>
    );
  }
  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between text-sm text-gray-500">
        <span className={`text-xs font-semibold px-3 py-1 rounded-full ${cl.badge}`}>{q.cat}</span>
        <span>{idx+1} / {pool.length}</span>
      </div>
      <div className="w-full bg-gray-200 rounded-full h-2">
        <div className={`${cl.bg} h-2 rounded-full`} style={{width:`${(idx/pool.length)*100}%`,transition:'width 0.3s'}}/>
      </div>
      <div className={`${cl.light} border-2 ${cl.border} rounded-2xl p-5`}>
        <p className="text-gray-800 font-medium text-base leading-relaxed">{q.q}</p>
      </div>
      <div className="space-y-3">
        {q.opts.map((opt,i)=>{
          let style="border-2 border-gray-200 bg-white text-gray-700";
          if(sel!==null){
            if(i===q.ans) style="border-2 border-teal-400 bg-teal-50 text-teal-800 font-semibold";
            else if(i===sel&&sel!==q.ans) style="border-2 border-red-400 bg-red-50 text-red-700";
            else style="border-2 border-gray-200 bg-gray-50 text-gray-400";
          }
          return (
            <button key={i} onClick={()=>{if(sel===null)setSel(i);}} className={`w-full text-left px-5 py-3 rounded-xl flex items-center gap-3 ${style}`}>
              <span className="w-7 h-7 rounded-full bg-gray-100 flex items-center justify-center text-xs font-bold flex-shrink-0">
                {sel!==null?(i===q.ans?"✓":i===sel?"✗":String.fromCharCode(65+i)):String.fromCharCode(65+i)}
              </span>
              {opt}
            </button>
          );
        })}
      </div>
      {sel!==null&&(
        <div className={`px-4 py-3 rounded-xl text-sm font-medium ${sel===q.ans?'bg-teal-50 border border-teal-300 text-teal-800':'bg-red-50 border border-red-300 text-red-800'}`}>
          {sel===q.ans?"✅ Correct! Well done.": `❌ Not quite. The correct answer is: "${q.opts[q.ans]}"`}
        </div>
      )}
      <button onClick={next} disabled={sel===null} className={`w-full py-3 rounded-xl font-bold text-white ${sel!==null?`${cl.btn}`:'bg-gray-300 cursor-not-allowed'}`}>
        {idx+1>=pool.length?"See Results →":"Next Question →"}
      </button>
    </div>
  );
}

// ─── CREATE ───────────────────────────────────────────────────────────
function CreateSection() {
  const [picked, setPicked] = useState(null);
  const [text, setText] = useState("");
  const [loading, setLoading] = useState(false);
  const [feedback, setFeedback] = useState(null);
  const [showModel, setShowModel] = useState(false);

  const wc = text.trim().split(/\s+/).filter(Boolean).length;
  const sc = scenarios.find(s=>s.id===picked);
  const cl = sc?C[sc.color]:null;

  const evaluate = useCallback(async()=>{
    if(!sc||wc<10) return;
    setLoading(true); setFeedback(null);
    const prompt=`You are an English language instructor at a UAE university. A student wrote a social media post based on this exam scenario:\n\nSCENARIO:\n- Announcement type: ${sc.type}\n- Rhetorical appeal: ${sc.appeal}\n- Writer: ${sc.writer}\n- Audience: ${sc.audience}\n- Purpose: ${sc.purpose}\n- Context: ${sc.context}\n\nSTUDENT'S POST (${wc} words):\n"${text.trim()}"\n\nEvaluate this post. It should:\n1. Match the announcement TYPE (${sc.type})\n2. Use the correct rhetorical appeal (${sc.appeal}) — for Logos: must include specific numbers/statistics from the context; for Ethos: must establish credibility; for Pathos: must use emotional language\n3. Have an engaging HOOK as the first sentence\n4. Be 50–60 words\n5. Address the correct audience\n\nRespond ONLY in this exact JSON format (no markdown, no backticks):\n{\n  "score": <0-100>,\n  "grade": "<Excellent|Good|Developing|Needs Improvement>",\n  "has_hook": <true|false>,\n  "hook_comment": "<one sentence about the hook>",\n  "announcement_type_correct": <true|false>,\n  "appeal_used": "<Logos|Ethos|Pathos|Unclear>",\n  "appeal_correct": <true|false>,\n  "appeal_comment": "<one sentence — if Logos, did they use numbers? if not, say what is missing>",\n  "word_count_ok": <true|false>,\n  "strengths": ["<point>", "<point>"],\n  "improvements": ["<point>", "<point>"],\n  "revised_example": "<improved version, 50-60 words, with a strong hook, correct appeal and announcement type>"\n}`;
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
      const data = await res.json();
      const raw = data.content?.map(b=>b.text||"").join("").replace(/```json|```/g,"").trim();
      setFeedback(JSON.parse(raw));
    } catch(e){ setFeedback({error:"Could not get feedback. Please try again."}); }
    setLoading(false);
  },[sc,text,wc]);

  return (
    <div className="space-y-5">
      <p className="text-sm font-semibold text-gray-600">Choose a scenario to write about:</p>
      <div className="grid grid-cols-2 gap-3">
        {scenarios.map(s=>{
          const c=C[s.color]; const sel=picked===s.id;
          return (
            <button key={s.id} onClick={()=>{setPicked(s.id);setText("");setFeedback(null);setShowModel(false);}}
              className={`p-3 rounded-xl border-2 text-left ${sel?`${c.border} ${c.light}`:'border-gray-200 bg-white'}`}>
              <div className="text-2xl mb-1">{s.emoji}</div>
              <div className={`text-sm font-bold ${sel?c.text:'text-gray-700'}`}>{s.title}</div>
              <div className={`text-xs mt-1 px-2 py-0.5 rounded-full inline-block ${sel?c.badge:'bg-gray-100 text-gray-500'}`}>{s.type.split('(')[1]?.replace(')','')}</div>
            </button>
          );
        })}
      </div>
      {sc&&(
        <>
          <div className={`${cl.light} border-2 ${cl.border} rounded-2xl p-4 space-y-2`}>
            <p className={`font-bold ${cl.text} text-sm`}>📋 Your Scenario Brief</p>
            <div className="space-y-1 text-sm">
              {[["📋 Type",sc.type],["🎭 Appeal",sc.appeal],["✍️ Writer",sc.writer],["👥 Audience",sc.audience],["🎯 Purpose",sc.purpose],["🌍 Context",sc.context]].map(([l,v])=>(
                <div key={l} className="flex gap-2"><span className="text-gray-500 flex-shrink-0" style={{minWidth:'6rem'}}>{l}:</span><span className="text-gray-800 font-medium">{v}</span></div>
              ))}
            </div>
            <p className="text-xs text-gray-500 italic mt-2">💡 {sc.tip}</p>
          </div>
          <div>
            <div className="flex justify-between items-center mb-2">
              <label className="text-sm font-semibold text-gray-700">✍️ Write your post (target: 50–60 words)</label>
              <span className={`text-xs font-bold px-2 py-1 rounded-full ${wc>=50&&wc<=60?'bg-teal-100 text-teal-700':wc>60?'bg-red-100 text-red-600':'bg-gray-100 text-gray-500'}`}>{wc} words</span>
            </div>
            <textarea value={text} onChange={e=>setText(e.target.value)} rows={5}
              placeholder="Start with a strong hook! Then include your message, details, and a call to action..."
              className={`w-full border-2 border-gray-200 rounded-xl p-4 text-gray-800 resize-none text-sm leading-relaxed`} style={{outline:'none'}}/>
          </div>
          <div className="flex gap-3">
            <button onClick={evaluate} disabled={loading||wc<10}
              className={`flex-1 py-3 rounded-xl font-bold text-white ${wc>=10&&!loading?cl.btn:'bg-gray-300 cursor-not-allowed'}`}>
              {loading?"⏳ Evaluating...":"🤖 Get AI Feedback"}
            </button>
            {sc.model&&<button onClick={()=>setShowModel(!showModel)} className="px-4 py-3 rounded-xl border-2 border-gray-300 text-gray-600 text-sm font-semibold">{showModel?"Hide":"Model"}</button>}
          </div>
          {showModel&&sc.model&&(
            <div className="bg-yellow-50 border-2 border-yellow-200 rounded-xl p-4 text-sm text-gray-700 italic leading-relaxed">
              <p className="text-yellow-700 font-bold text-xs mb-2">📝 MODEL ANSWER</p>{sc.model}
            </div>
          )}
          {feedback&&!feedback.error&&(
            <div className="space-y-4 border-t-2 border-gray-100 pt-4">
              <div className="flex items-center gap-4">
                <div className={`w-20 h-20 rounded-full flex items-center justify-center text-2xl font-black text-white flex-shrink-0 ${feedback.score>=80?'bg-teal-400':feedback.score>=60?'bg-orange-400':'bg-red-400'}`}>{feedback.score}</div>
                <div>
                  <p className="font-bold text-gray-800 text-lg">{feedback.grade}</p>
                  <div className="flex flex-wrap gap-2 mt-1">
                    {[[feedback.has_hook,"Hook"],[feedback.announcement_type_correct,"Correct type"],[feedback.appeal_correct,`Appeal: ${feedback.appeal_used}`],[feedback.word_count_ok,"Word count"]].map(([ok,label])=>(
                      <span key={label} className={`text-xs px-2 py-0.5 rounded-full font-medium ${ok?'bg-teal-100 text-teal-700':'bg-red-100 text-red-600'}`}>{ok?"✓":"✗"} {label}</span>
                    ))}
                  </div>
                </div>
              </div>
              {feedback.hook_comment&&<div className={`px-4 py-3 rounded-xl text-sm ${feedback.has_hook?'bg-teal-50 border border-teal-200 text-teal-800':'bg-orange-50 border border-orange-200 text-orange-800'}`}><span className="font-bold">🪝 Hook: </span>{feedback.hook_comment}</div>}
              {feedback.appeal_comment&&<div className={`px-4 py-3 rounded-xl text-sm ${feedback.appeal_correct?'bg-teal-50 border border-teal-200 text-teal-800':'bg-orange-50 border border-orange-200 text-orange-800'}`}><span className="font-bold">🎭 Appeal: </span>{feedback.appeal_comment}</div>}
              <div className="bg-teal-50 border border-teal-200 rounded-xl p-4">
                <p className="text-teal-700 font-bold text-sm mb-2">💪 Strengths</p>
                <ul className="space-y-1">{feedback.strengths?.map((s,i)=><li key={i} className="text-sm text-gray-700 flex gap-2"><span className="text-teal-500 flex-shrink-0">✓</span>{s}</li>)}</ul>
              </div>
              <div className="bg-orange-50 border border-orange-200 rounded-xl p-4">
                <p className="text-orange-700 font-bold text-sm mb-2">🔧 Suggestions</p>
                <ul className="space-y-1">{feedback.improvements?.map((s,i)=><li key={i} className="text-sm text-gray-700 flex gap-2"><span className="text-orange-500 flex-shrink-0">→</span>{s}</li>)}</ul>
              </div>
              {feedback.revised_example&&(
                <div className="bg-purple-50 border border-purple-200 rounded-xl p-4">
                  <p className="text-purple-700 font-bold text-sm mb-2">✨ How it could look</p>
                  <p className="text-sm text-gray-700 italic leading-relaxed">{feedback.revised_example}</p>
                </div>
              )}
            </div>
          )}
          {feedback?.error&&<div className="bg-red-50 border border-red-200 rounded-xl p-3 text-red-700 text-sm">{feedback.error}</div>}
        </>
      )}
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("learn");
  const tabs = [{id:"learn",label:"📚 Learn",color:"purple"},{id:"practice",label:"🎯 Practice",color:"teal"},{id:"create",label:"✍️ Create",color:"pink"}];
  return (
    <div className="min-h-screen pb-10">
      <div style={{background:'linear-gradient(to right,#7c3aed,#ec4899)'}} className="text-white px-5 pt-8 pb-16 text-center shadow-lg">
        <p className="text-xs uppercase tracking-widest mb-1" style={{color:'#e9d5ff'}}>LSC 1103 · Interactive Lab</p>
        <h1 className="text-2xl font-black">Social Media Communication</h1>
        <p className="text-sm mt-1" style={{color:'#f3e8ff'}}>Purpose · Announcement Types · Hooks · Appeals · Writing</p>
      </div>
      <div className="max-w-xl mx-auto px-4" style={{marginTop:'-2rem'}}>
        <div className="bg-white rounded-3xl shadow-xl overflow-hidden">
          <div className="flex border-b border-gray-100">
            {tabs.map(t=>{
              const cl=C[t.color]; const active=tab===t.id;
              return <button key={t.id} onClick={()=>setTab(t.id)} className={`flex-1 py-3 text-sm font-bold ${active?`${cl.text} border-b-2 ${cl.border}`:'text-gray-400'}`}>{t.label}</button>;
            })}
          </div>
          <div className="p-5">
            {tab==="learn"&&<LearnSection/>}
            {tab==="practice"&&<PracticeSection/>}
            {tab==="create"&&<CreateSection/>}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
